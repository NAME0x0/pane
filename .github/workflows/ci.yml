name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Native runtime preflight smoke
        run: cargo run -- native-preflight --json --session-name ci-native-preflight

  package-windows:
    name: Package Windows Build
    runs-on: windows-latest
    needs: rust-quality
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust

      - name: Build packaged release
        shell: pwsh
        run: ./scripts/package.ps1 -Profile release

      - name: Smoke packaged entrypoints
        shell: pwsh
        run: ./dist/pane-windows-x86_64/certify-fresh-machine.ps1 -Mode PackageOnly

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: pane-windows-package
          path: |
            dist/pane-windows-x86_64.exe
            dist/pane-windows-x86_64.zip
            dist/pane-windows-x86_64/**

  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          for f in docs/*.html; do
            echo "Checking $f..."
            if grep -qP '[\x80-\xff]' "$f" 2>/dev/null; then
              echo "Warning: non-ASCII characters in $f"
            fi
            echo "OK"
          done

      - name: Check for broken local links
        run: |
          cd docs
          for href in $(grep -oP 'href="(?!http|data:|#)([^"]+)"' *.html | grep -oP '"[^"]+"' | tr -d '"'); do
            if [ ! -f "$href" ]; then
              echo "Broken link: $href"
              exit 1
            fi
          done
          echo "All local links valid"
