name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "short"

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check --locked

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

  cross-platform-check:
    name: Cross-Platform Rust Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Check non-Windows build surface
        run: cargo check --locked

      - name: Test non-Windows portable units
        run: cargo test --locked

  guest-discovery-artifacts:
    name: Guest Discovery Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: cross-platform-check
    env:
      LOCALAPPDATA: ${{ runner.temp }}/pane-localappdata
      PANE_SESSION: ci-guest-discovery
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install static C toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc libc6-dev

      - name: Generate Pane initramfs driver bundle
        run: cargo run --locked -- runtime --session-name "$PANE_SESSION" --prepare --write-initramfs-driver --json

      - name: Compile guest discovery ELFs
        run: |
          set -euo pipefail
          driver_dir="$LOCALAPPDATA/Pane/runtime/$PANE_SESSION/engines/pane-initramfs-driver"
          artifact_dir="$RUNNER_TEMP/pane-guest-discovery"
          mkdir -p "$artifact_dir"
          cc -Os -static -o "$artifact_dir/init" "$driver_dir/pane-init.c"
          cc -Os -static -o "$artifact_dir/pane-port-probe" "$driver_dir/pane-port-probe.c"
          test "$(head -c 4 "$artifact_dir/init")" = "$(printf '\177ELF')"
          test "$(head -c 4 "$artifact_dir/pane-port-probe")" = "$(printf '\177ELF')"
          sha256sum "$artifact_dir/init" "$artifact_dir/pane-port-probe" > "$artifact_dir/SHA256SUMS"

      - name: Upload guest discovery ELFs
        uses: actions/upload-artifact@v4
        with:
          name: pane-guest-discovery-elfs
          retention-days: 14
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/pane-guest-discovery/init
            ${{ runner.temp }}/pane-guest-discovery/pane-port-probe
            ${{ runner.temp }}/pane-guest-discovery/SHA256SUMS

  docs-and-scripts:
    name: Docs and Script Hygiene
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $scripts = Get-ChildItem -Path scripts, .github -Recurse -Include *.ps1,*.psm1 -File
          foreach ($script in $scripts) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$null, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$($script.FullName): $($_.Message)" }
              throw "PowerShell parse failed for $($script.FullName)"
            }
          }

      - name: Validate local Markdown and HTML links
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = (Get-Location).Path
          $files = @("README.md") + (Get-ChildItem docs -Recurse -Include *.md,*.html -File | ForEach-Object { $_.FullName })
          $missing = New-Object System.Collections.Generic.List[string]
          foreach ($file in $files) {
            $text = Get-Content -LiteralPath $file -Raw
            $base = Split-Path -Parent $file
            if ([string]::IsNullOrWhiteSpace($base)) {
              $base = "."
            }
            $markdownLinks = [regex]::Matches($text, '\[[^\]]+\]\(([^)#?][^)#?]*)(?:#[^)]+)?\)')
            $htmlLinks = [regex]::Matches($text, 'href="([^"#?:][^"#]*)"')
            foreach ($match in @($markdownLinks) + @($htmlLinks)) {
              $target = $match.Groups[1].Value
              if ([string]::IsNullOrWhiteSpace($target)) { continue }
              if ($target -match '^(https?://|mailto:|data:|#)') { continue }
              $localTarget = ($target -split '[?#]', 2)[0]
              if ([string]::IsNullOrWhiteSpace($localTarget)) { continue }
              $resolved = Join-Path $base $localTarget
              if (-not (Test-Path -LiteralPath $resolved)) {
                $relativeFile = Resolve-Path -LiteralPath $file -Relative
                $missing.Add("${relativeFile}: missing local link ${target}")
              }
            }
          }
          if ($missing.Count -gt 0) {
            $missing | ForEach-Object { Write-Error $_ }
            throw "Local documentation link validation failed."
          }

      - name: Validate deployed docs use HTML routes
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rawMarkdownLinks = New-Object System.Collections.Generic.List[string]
          $siteFiles = Get-ChildItem docs -Recurse -Include *.html,*.js -File
          foreach ($file in $siteFiles) {
            $text = Get-Content -LiteralPath $file.FullName -Raw
            $links = [regex]::Matches($text, 'href="([^"]+\.md(?:#[^"]*)?)"')
            foreach ($link in $links) {
              $relativeFile = Resolve-Path -LiteralPath $file.FullName -Relative
              $rawMarkdownLinks.Add("${relativeFile}: raw deployed Markdown link $($link.Groups[1].Value)")
            }
          }
          if ($rawMarkdownLinks.Count -gt 0) {
            $rawMarkdownLinks | ForEach-Object { Write-Error $_ }
            throw "Deployed docs should link to HTML reader routes, not raw Markdown files."
          }

  native-runtime-smoke:
    name: Native Runtime Smoke
    runs-on: windows-latest
    timeout-minutes: 20
    needs: rust-quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Native preflight JSON
        run: cargo run --locked -- native-preflight --json --session-name ci-native-preflight

      - name: Native boot-spike plan JSON
        run: cargo run --locked -- native-boot-spike --json --session-name ci-native-preflight

      - name: Native kernel-layout plan JSON
        run: cargo run --locked -- native-boot-spike --json --run-kernel-layout --session-name ci-native-preflight

      - name: Pane-owned launch dry run
        run: cargo run --locked -- launch --runtime pane-owned --dry-run --session-name ci-native-preflight

  package-windows:
    name: Package Windows Build
    runs-on: windows-latest
    timeout-minutes: 30
    needs:
      - rust-quality
      - docs-and-scripts
      - native-runtime-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Build packaged release
        shell: pwsh
        run: ./scripts/package.ps1 -Profile release

      - name: Certify packaged entrypoints
        shell: pwsh
        run: ./dist/pane-windows-x86_64/certify-fresh-machine.ps1 -Mode PackageOnly

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: pane-windows-package
          retention-days: 14
          if-no-files-found: error
          path: |
            dist/pane-windows-x86_64.exe
            dist/pane-windows-x86_64.zip
            dist/pane-windows-x86_64/**

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - rust-quality
      - cross-platform-check
      - docs-and-scripts
      - native-runtime-smoke
      - guest-discovery-artifacts
      - package-windows
    if: always()
    steps:
      - name: Verify required jobs
        run: |
          set -euo pipefail
          for result in \
            "${{ needs.rust-quality.result }}" \
            "${{ needs.cross-platform-check.result }}" \
            "${{ needs.docs-and-scripts.result }}" \
            "${{ needs.native-runtime-smoke.result }}" \
            "${{ needs.guest-discovery-artifacts.result }}" \
            "${{ needs.package-windows.result }}"; do
            if [ "$result" != "success" ]; then
              echo "A required CI job failed or was skipped: $result"
              exit 1
            fi
          done
          echo "All required CI jobs passed."
