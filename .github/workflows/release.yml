name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to use if publishing a draft prerelease"
        required: true
        default: "v0.1.0-pre.1"
        type: string
      publish_release:
        description: "Create a draft prerelease on GitHub"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    name: Build Release Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust

      - name: Build packaged release
        shell: pwsh
        run: ./scripts/package.ps1 -Profile release

      - name: Smoke packaged entrypoints
        shell: pwsh
        run: ./dist/pane-windows-x86_64/certify-fresh-machine.ps1 -Mode PackageOnly

      - name: Generate checksums
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "dist\pane-windows-x86_64.exe"
          $zip = Join-Path $PWD "dist\pane-windows-x86_64.zip"
          $exeHash = Get-FileHash $exe -Algorithm SHA256
          $zipHash = Get-FileHash $zip -Algorithm SHA256
          "SHA256  $($exeHash.Hash)  pane-windows-x86_64.exe" | Set-Content (Join-Path $PWD "dist\pane-windows-x86_64.exe.sha256") -Encoding utf8
          "SHA256  $($zipHash.Hash)  pane-windows-x86_64.zip" | Set-Content (Join-Path $PWD "dist\pane-windows-x86_64.zip.sha256") -Encoding utf8

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pane-release
          path: |
            dist/pane-windows-x86_64.exe
            dist/pane-windows-x86_64.exe.sha256
            dist/pane-windows-x86_64.zip
            dist/pane-windows-x86_64.zip.sha256

      - name: Publish GitHub release
        if: ${{ inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pane-windows-x86_64.exe
            dist/pane-windows-x86_64.exe.sha256
            dist/pane-windows-x86_64.zip
            dist/pane-windows-x86_64.zip.sha256
          tag_name: ${{ inputs.tag_name }}
          name: Pane ${{ inputs.tag_name }}
          draft: true
          prerelease: true
          generate_release_notes: true
