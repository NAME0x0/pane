name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to use if publishing a draft prerelease"
        required: true
        default: "v0.1.0-pre.1"
        type: string
      publish_release:
        description: "Create a draft prerelease on GitHub"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "short"
  PANE_RELEASE_BASE_IMAGE_URL: "https://github.com/NAME0x0/pane/releases/download/v0.2.0/arch-base.paneimg.zip"
  PANE_RELEASE_BASE_IMAGE_ZIP_SHA256: "bc6be81d43d2e6837385849f2040eb08fd613949b6431d87baa5c9580b6e813c"

jobs:
  validate-inputs:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate tag format
        run: |
          set -euo pipefail
          tag="${{ inputs.tag_name }}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid tag_name: $tag"
            echo "Expected format like v0.1.0 or v0.1.0-pre.1"
            exit 1
          fi

  package:
    name: Build, Certify, and Package
    runs-on: windows-latest
    timeout-minutes: 35
    needs: validate-inputs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Verify release quality gates
        shell: pwsh
        run: |
          cargo fmt --check
          cargo check --locked
          cargo test --locked
          cargo clippy --locked -- -D warnings

      - name: Install QEMU engine
        shell: pwsh
        run: choco install qemu -y --no-progress

      - name: Build packaged release
        shell: pwsh
        run: ./scripts/package.ps1 -Profile release -BundleQemu Required

      - name: Certify packaged release
        shell: pwsh
        run: ./dist/pane-windows-x86_64/certify-fresh-machine.ps1 -Mode PackageOnly

      - name: Download base image release asset
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $asset = Join-Path $PWD "dist\arch-base.paneimg.zip"
          curl.exe -L --fail --retry 3 --retry-delay 5 -o $asset $env:PANE_RELEASE_BASE_IMAGE_URL
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($hash -ne $env:PANE_RELEASE_BASE_IMAGE_ZIP_SHA256) {
            throw "Base image asset SHA-256 mismatch. Expected $env:PANE_RELEASE_BASE_IMAGE_ZIP_SHA256, got $hash."
          }

      - name: Generate checksums and manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = Join-Path $PWD "dist"
          $files = @(
            "pane-windows-x86_64.zip",
            "arch-base.paneimg.zip"
          )
          $manifest = [ordered]@{
            name = "pane"
            tag = "${{ inputs.tag_name }}"
            prerelease = $true
            generated_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            artifacts = @()
          }
          foreach ($file in $files) {
            $path = Join-Path $dist $file
            if (-not (Test-Path $path)) {
              throw "Missing release artifact: $path"
            }
            $hash = Get-FileHash $path -Algorithm SHA256
            "SHA256  $($hash.Hash)  $file" | Set-Content (Join-Path $dist "$file.sha256") -Encoding utf8
            $manifest.artifacts += [ordered]@{
              file = $file
              sha256 = $hash.Hash
              bytes = (Get-Item $path).Length
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content (Join-Path $dist "pane-release-manifest.json") -Encoding utf8

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pane-release
          retention-days: 30
          if-no-files-found: error
          path: |
            dist/pane-windows-x86_64.zip
            dist/pane-windows-x86_64.zip.sha256
            dist/arch-base.paneimg.zip
            dist/arch-base.paneimg.zip.sha256
            dist/pane-release-manifest.json

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/pane-windows-x86_64.zip
            dist/arch-base.paneimg.zip
            dist/pane-release-manifest.json

      - name: Publish GitHub release
        if: ${{ inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pane-windows-x86_64.zip
            dist/pane-windows-x86_64.zip.sha256
            dist/arch-base.paneimg.zip
            dist/arch-base.paneimg.zip.sha256
            dist/pane-release-manifest.json
          tag_name: ${{ inputs.tag_name }}
          name: Pane ${{ inputs.tag_name }}
          draft: true
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
