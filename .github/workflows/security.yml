name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          # Tauri 2.11.3 is the latest available release and still carries this
          # Linux-only GTK/glib advisory through Wry/WebKitGTK. Pane's GUI is
          # Windows-only; keep this allowlist narrow and remove it when Tauri
          # publishes a GTK4/WebKitGTK-free chain.
          allow-ghsas: GHSA-wrw7-89jp-8q8g

  cargo-audit:
    name: Rust Vulnerability Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit Cargo dependencies
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2024-0411 \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0414 \
            --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 \
            --ignore RUSTSEC-2024-0417 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2025-0075 \
            --ignore RUSTSEC-2025-0080 \
            --ignore RUSTSEC-2025-0081 \
            --ignore RUSTSEC-2025-0098 \
            --ignore RUSTSEC-2025-0100

  codeql:
    name: CodeQL
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          queries: security-and-quality

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Build for analysis
        run: cargo build --locked

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
